apiVersion: apps/v1
kind: Deployment
metadata:
  name: otbr
  namespace: otbr
  labels:
    app: otbr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: otbr
  template:
    metadata:
      labels:
        app: otbr
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ubuntu-k8s
      containers:
      - name: otbr
        image: ghcr.io/ownbee/hass-otbr-docker:latest
        securityContext:
          privileged: true
        env:
        - name: DEVICE
          value: /dev/ttyACM0
        - name: BAUDRATE
          value: "460800"
        - name: FLOW_CONTROL
          value: "true"
        - name: BACKBONE_IF
          value: eno1
        - name: FIREWALL
          value: "0"
        - name: NAT64
          value: "0"
        - name: OTBR_REST_PORT
          value: "8081"
        - name: OTBR_WEB_PORT
          value: "8086"
        - name: AUTOFLASH_FIRMWARE
          value: "1"
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/bash
              - -c
              - |
                for i in $(seq 1 30); do
                  prefix=$(ot-ctl br omrprefix 2>/dev/null | grep "Local:" | awk '{print $2}')
                  if [ -n "$prefix" ]; then
                    ip -6 route add "$prefix" dev wpan0 2>/dev/null || true
                    break
                  fi
                  sleep 2
                done
        volumeMounts:
        - name: data
          mountPath: /data
        - name: usb
          mountPath: /dev/ttyACM0
        - name: tun
          mountPath: /dev/net/tun
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: otbr-data
      - name: usb
        hostPath:
          path: /dev/serial/by-id/usb-Nabu_Casa_ZBT-2_DCB4D9124108-if00
          type: CharDevice
      - name: tun
        hostPath:
          path: /dev/net/tun
          type: CharDevice
