      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: prowlarr-tls
        namespace: cilium-gateway
  - name: https-seerr
    hostname: seerr.sync.lt
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: seerr-tls
        namespace: cilium-gateway
  - name: https-sync-lt
