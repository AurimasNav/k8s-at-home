apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources: []
namespace: home-assistant


helmCharts:
- name: home-assistant
  version: 0.3.71
  repo: http://pajikos.github.io/home-assistant-helm-chart/
  releaseName: home-assistant
  includeCRDs: true
  namespace: home-assistant
  valuesFile: values.yaml

patches:
  - target:
      kind: Service
      name: home-assistant
    patch: |-
      - op: add
        path: /spec/ports/-
        value:
          name: udp-9999
          port: 9999
          targetPort: 9999
          protocol: UDP