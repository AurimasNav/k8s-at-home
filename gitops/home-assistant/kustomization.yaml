apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources: []
namespace: home-assistant

# Vendored mkaiser Sungrow package (full sensor set) shipped as a ConfigMap and
# mounted at /config/packages (see values.yaml additionalVolumes / additionalMounts).
configMapGenerator:
- name: ha-sungrow-package
  files:
  - packages/modbus_sungrow.yaml
generatorOptions:
  disableNameSuffixHash: true

helmCharts:
- name: home-assistant
  version: 0.3.70
  repo: http://pajikos.github.io/home-assistant-helm-chart/
  releaseName: home-assistant
  includeCRDs: true
  namespace: home-assistant
  valuesFile: values.yaml

patches:
  - target:
      kind: Service
      name: home-assistant
    patch: |-
      - op: add
        path: /spec/ports/-
        value:
          name: udp-9999
          port: 9999
          targetPort: 9999
          protocol: UDP