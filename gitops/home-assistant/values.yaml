service:
  type: LoadBalancer
  port: 8123
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.1.129
configuration:
  # Enable or disable the configuration setup for Home Assistant
  enabled: true
  # Force init will merge the current configuration file with the default configuration on every start
  # This is useful when you want to ensure that the configuration file is always up to date
  forceInit: true
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet
securityContext:
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
persistence:
  enabled: true
  size: 5Gi

# Long startup grace: a slow integration setup (e.g. modbus/Sungrow polling the
# RS485->ETH bridge on boot) must not be killed by the liveness probe, which would
# cause a crash loop. Once HA finishes starting, the liveness probe takes over.
startupProbe:
  httpGet:
    path: /
    port: http
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60

ingress:
  # Enable ingress for home assistant
  enabled: true
  # Enable external ingress (cannot be true when ingress.enabled is true)
  external: false
  className: nginx
  labels: {}
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.org/proxy-read-timeout: "7200s"
    nginx.org/proxy-send-timeout: "7200s"
    nginx.org/keepalive: 300
  hosts:
    - host: assistant.sync.lt
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
  - hosts:
    - assistant.sync.lt
    secretName: assistant-letsencrypt
