apiVersion: apps/v1
kind: Deployment
metadata:
  name: matter-server
  namespace: matter-server
  labels:
    app: matter-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: matter-server
  template:
    metadata:
      labels:
        app: matter-server
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: ubuntu-k8s
      containers:
      - name: avahi
        image: flungo/avahi:latest
        securityContext:
          privileged: true
        volumeMounts:
        - name: dbus
          mountPath: /var/run/dbus
      - name: matter-server
        image: ghcr.io/home-assistant-libs/python-matter-server:stable
        securityContext:
          privileged: true
        args:
        - --storage-path=/data
        - --paa-root-cert-dir=/data/credentials
        - --primary-interface=eno1
        ports:
        - containerPort: 5580
        volumeMounts:
        - name: data
          mountPath: /data
        - name: dbus
          mountPath: /var/run/dbus
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: matter-server-data
      - name: dbus
        hostPath:
          path: /run/dbus
